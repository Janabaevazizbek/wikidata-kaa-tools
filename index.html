<!DOCTYPE html>
<html lang="kaa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qaraqalpaqstan Wikidata Kartası</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #0056b3; color: white; padding: 15px; text-align: center; }
        select { padding: 10px; margin: 10px; width: 300px; font-size: 16px; }
        #map-container { flex-grow: 1; position: relative; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
    </style>
</head>
<body>

<header>
    <h1>Qaraqalpaqstan Respublikasınıń Wikidatadaǵı maǵlıwmatlar kartası</h1>
    <p>Qaraqalpaqstan rayonlarındaǵı Wikidata maǵlıwmatların analizlew</p>
</header>

<div style="text-align: center;">
    <label for="ilce-sec">Rayondı saylań:</label>
    <select id="ilce-sec">
        <option value=""> Aymaqtı saylań </option>
        <option value="Q2603639">Ámiwdárya rayonı</option>
        <option value="Q2603530">Beruniy rayonı</option>
        <option value="Q12820397">Bozataw rayonı</option>
        <option value="Q2609551">Shımbay rayonı</option>
        <option value="Q939147">Ellikqala rayonı</option>
        <option value="Q2609556">Kegeyli rayonı</option>
        <option value="Q2603644">Qanlıkól rayonı</option>
        <option value="Q2609569">Qońırat rayonı</option>
        <option value="Q2609548">Qaraózek rayonı</option>
        <option value="Q2603621">Moynaq rayonı</option>
        <option value="Q489898">Nókis qalası</option>
        <option value="Q2603584">Nókis rayonı</option>
        <option value="Q693197">Shomanay rayonı</option>
        <option value="Q2603597">Taxtakópir rayonı</option>
        <option value="Q2642167">Tórtkúl rayonı</option>
        <option value="Q2603630">Xojeli rayonı</option>
        <option value="Q55664316">Taqıyatas rayonı</option>
    </select>
</div>

<div id="map-container">
    <div id="map"></div>
</div>

<script>
    // Haritayı Karakalpakistan'a (Nókis merkezli) odaklayarak başlattık
    var map = L.map('map').setView([43.5, 59.8], 6.3); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var currentLayer = L.layerGroup().addTo(map); // Noktaları tutacak katman

    // Menüden bir ilçe seçildiğinde çalışacak "Sihirli" JavaScript kodu
    document.getElementById('ilce-sec').addEventListener('change', function(e) {
        var ilceId = e.target.value;
        if (!ilceId) return;

        currentLayer.clearLayers(); // Eski noktaları sil

        // Wikidata'ya gönderilecek SPARQL sorgusunu hazırladık (Seçilen ilçe ID'si ile)
        var sparqlQuery = `
            SELECT ?item ?itemLabel ?koordinat
            WHERE {
                ?item wdt:P131 wd:${ilceId}. 
                ?item wdt:P625 ?koordinat. 
                SERVICE wikibase:label { bd:serviceParam wikibase:language "kaa,en,tr". }
            }
        `;

        // Wikidata Sorgu Servisine (SPARQL endpoint) veriyi gönderiyoruz
        var url = 'https://query.wikidata.org/sparql?query=' + encodeURIComponent(sparqlQuery);

        fetch(url, { headers: { 'Accept': 'application/sparql-results+json' } })
            .then(response => response.json())
            .then(data => {
                // Gelen verileri döngüye alıp haritaya noktalar basıyoruz
                data.results.bindings.forEach(result => {
                    var koordinatStr = result.koordinat.value.replace('Point(', '').replace(')', '');
                    var coords = koordinatStr.split(' ');
                    var lat = parseFloat(coords[1]);
                    var lon = parseFloat(coords[0]);
                    var label = result.itemLabel.value;

                    // Haritaya interaktif bir nokta ekle
                    L.marker([lat, lon]).addTo(currentLayer).bindPopup(`<b>${label}</b>`);
                });
            })
            .catch(error => console.error('Qátelik:', error));
    });
</script>

</body>
</html>
